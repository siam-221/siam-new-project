<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S1AM | Graphical Portfolio</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a192f;
            color: #64ffda;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: rgba(10, 25, 47, 0.7);
        }
        .hero h1 {
            font-size: 3.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 20px #64ffda;
        }
        .hero p {
            font-size: 1.2rem;
            color: #8892b0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 255, 218, 0.2);
            padding: 40px;
            border-radius: 20px;
            margin: 50px auto;
            max-width: 800px;
        }
        .skill-box {
            display: inline-block;
            border: 1px solid #64ffda;
            padding: 5px 15px;
            margin: 5px;
            transition: 0.3s;
        }
        .skill-box:hover {
            background: #64ffda;
            color: #0a192f;
        }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="hero">
    <h1>S1AM</h1>
    <p>Assistant Supervisor – CCTV Surveillance</p>
    <p>Network & Automation Enthusiast</p>
</div>

<div class="container">
    <div class="glass-card">
        <h2>System Info</h2>
        <p>Location: Gazipur, Bangladesh</p>
        <p>Expertise: CCTV Infrastructure, WAN Topologies, Python Automation</p>
        <div class="skills-container">
            <div class="skill-box">Python</div>
            <div class="skill-box">Cybersecurity</div>
            <div class="skill-box">Networking</div>
            <div class="skill-box">Malware Analysis</div>
        </div>
    </div>
</div>

<script>
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80 },
            "color": { "value": "#64ffda" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.5 },
            "size": { "value": 3 },
            "line_linked": { "enable": true, "distance": 150, "color": "#64ffda", "opacity": 0.4, "width": 1 },
            "move": { "enable": true, "speed": 4 }
        },
        "interactivity": {
            "events": { "onhover": { "enable": true, "mode": "repulse" } }
        }
    });
</script>

</body>
</html>
