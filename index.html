<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S1AM | Cyber Surveillance & Network Expert</title>
    <style>
        /* --- CSS Section --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #050505; 
            color: #00ff41; 
            font-family: 'Courier New', Courier, monospace; 
            overflow-x: hidden; 
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .main-content {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(3px);
        }

        .glitch {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 15px #00ff41;
            margin-bottom: 10px;
            letter-spacing: 8px;
        }

        .profile-card {
            border: 1px solid #00ff41;
            padding: 25px;
            background: rgba(0, 255, 65, 0.05);
            max-width: 800px;
            width: 100%;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border-radius: 5px;
            text-align: center;
        }

        .tagline { color: #fff; font-size: 1.1rem; margin-bottom: 5px; }
        .company { color: #00ff41; font-weight: bold; margin-bottom: 15px; }

        /* Typing Effect Style */
        #typing-text {
            font-weight: bold;
            color: #fff;
            border-right: 2px solid #00ff41;
            padding-right: 5px;
        }

        /* Dashboard Stats */
        .dashboard {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            text-align: left;
        }

        .stat-card {
            border: 1px dashed #00ff41;
            padding: 12px;
            background: rgba(0, 255, 65, 0.02);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #111;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #00ff41;
            box-shadow: 0 0 10px #00ff41;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse { from { width: 50%; } to { width: 95%; } }

        /* Contact Form */
        .contact-form {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }

        input, textarea {
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid #00ff41;
            padding: 10px;
            color: #fff;
            font-family: inherit;
        }

        .submit-btn {
            background: #00ff41;
            color: #000;
            padding: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .submit-btn:hover { box-shadow: 0 0 15px #00ff41; transform: scale(1.02); }

        footer { margin-top: 30px; color: #444; font-size: 0.7rem; }
    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div class="main-content">
    <div class="glitch">S1AM</div>
    
    <div class="profile-card">
        <p class="tagline">Assistant Supervisor – CCTV Surveillance</p>
        <p class="company">Interstoff Apparels Ltd.</p>
        
        <p>Expert in: <span id="typing-text"></span></p>

        <div class="dashboard">
            <div class="stat-card">
                <p>Cameras: 300+</p>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>
            <div class="stat-card">
                <p>Network: WAN/Hub</p>
                <div class="progress-bar"><div class="progress-fill" style="animation-delay: 0.5s;"></div></div>
            </div>
            <div class="stat-card">
                <p>System Uptime: 99%</p>
                <div class="progress-bar"><div class="progress-fill" style="animation-delay: 1s;"></div></div>
            </div>
        </div>

        <div class="contact-form">
            <input type="text" placeholder="Name">
            <textarea rows="2" placeholder="Message"></textarea>
            <button class="submit-btn" onclick="sendWhatsApp()">SEND VIA WHATSAPP</button>
        </div>
    </div>

    <footer>&copy; 2026 Secured by S1AM</footer>
</div>

<script>
    // --- JavaScript Section ---

    // 1. Matrix Background
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const alphabet = "010101S1AM";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff41";
        ctx.font = fontSize + "px arial";
        drops.forEach((y, i) => {
            const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
            ctx.fillText(text, i * fontSize, y * fontSize);
            if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(drawMatrix, 35);

    // 2. Typing Animation
    const typingSpan = document.getElementById("typing-text");
    const phrases = ["Python Automation", "CCTV Infrastructure", "Malware Analysis", "Network Security"];
    let pIdx = 0, cIdx = 0, isErasing = false;

    function typeEffect() {
        const current = phrases[pIdx];
        if (isErasing) {
            typingSpan.textContent = current.substring(0, cIdx--);
            if (cIdx < 0) { isErasing = false; pIdx = (pIdx + 1) % phrases.length; }
        } else {
            typingSpan.textContent = current.substring(0, cIdx++);
            if (cIdx > current.length) isErasing = true;
        }
        setTimeout(typeEffect, isErasing ? 50 : 150);
    }
    typeEffect();

    // 3. WhatsApp Redirect
    function sendWhatsApp() {
        const msg = "Hello S1AM, I visited your portfolio!";
        window.open(`https://wa.me/YOUR_NUMBER_HERE?text=${encodeURIComponent(msg)}`, '_blank');
    }

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>

</body>
</html>
